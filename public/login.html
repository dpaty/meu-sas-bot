<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sâmara AI | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f1a; height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; color: white; }
        .login-box { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); padding: 48px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 380px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        input { width: 100%; padding: 16px; margin-bottom: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 16px; background: #3b82f6; border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Sâmara AI</h1>
        <p>Acesse seu painel</p>
        <form id="loginForm">
            <input type="password" id="password" placeholder="Senha Mestra" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
